<!-- Usage: {% include "frontend/components/empty_state.html" with icon="briefcase" title="No jobs found" description="Try adjusting your filters" %} -->
<div class="empty-state py-16">
  <div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center mb-4">
    {% if icon == "briefcase" %}
    <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
    </svg>
    {% elif icon == "bell" %}
    <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
    </svg>
    {% elif icon == "document" %}
    <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
    </svg>
    {% else %}
    <svg class="w-8 h-8 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
    </svg>
    {% endif %}
  </div>
  <h3 class="text-lg font-semibold text-white mb-1">{{ title }}</h3>
  <p class="text-sm text-white/60 max-w-sm">{{ description }}</p>
  {% if action_url %}
  <a href="{{ action_url }}" class="mt-4 inline-flex items-center px-4 py-2 text-white text-sm font-medium rounded-lg transition-all hover:-translate-y-0.5" style="background: linear-gradient(135deg, var(--hf-indigo), var(--hf-indigo-dark)); box-shadow: var(--shadow-glow-indigo);">
    {{ action_text|default:"Get started" }}
  </a>
  {% endif %}
</div>
