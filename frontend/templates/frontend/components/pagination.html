<!-- Cursor-based pagination controls (used with Alpine.js) -->
<div class="flex items-center justify-between py-4" x-show="prevCursor || nextCursor">
  <button
    @click="loadPage(prevCursor)"
    :disabled="!prevCursor"
    class="inline-flex items-center gap-1 px-4 py-2 text-sm font-medium rounded-lg border transition-colors text-white/70 hover:text-white bg-white/5 border-white/10 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Previous
  </button>
  <button
    @click="loadPage(nextCursor)"
    :disabled="!nextCursor"
    class="inline-flex items-center gap-1 px-4 py-2 text-sm font-medium rounded-lg border transition-colors text-white/70 hover:text-white bg-white/5 border-white/10 hover:bg-white/10 disabled:opacity-50 disabled:cursor-not-allowed">
    Next
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
    </svg>
  </button>
</div>
