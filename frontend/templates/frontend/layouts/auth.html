{% extends "frontend/base.html" %}

{% block body %}
<div class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative" style="background: var(--hf-auth-bg);">
  <!-- Subtle gradient orbs -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[400px] rounded-full opacity-[0.06] pointer-events-none" style="background: var(--hf-auth-orb);"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <!-- Logo -->
    <a href="{% url 'frontend:landing' %}" class="flex items-center justify-center gap-2 mb-6">
      <span class="font-display text-2xl font-bold">
        <span class="text-primary-400">H</span><span style="color: var(--hf-text-primary);">ireFlow</span>
      </span>
    </a>
    <h2 class="text-center text-2xl font-display font-bold" style="color: var(--hf-text-primary);">
      {% block auth_title %}Sign in{% endblock %}
    </h2>
    <p class="mt-2 text-center text-sm" style="color: var(--hf-text-muted);">
      {% block auth_subtitle %}{% endblock %}
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="py-8 px-4 sm:rounded-2xl sm:px-10 border" style="background: var(--hf-card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-color: var(--hf-card-border);">
      {% block auth_content %}{% endblock %}
    </div>
  </div>
</div>
{% endblock %}
