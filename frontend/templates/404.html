{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — HireFlow</title>
  <script>
    (function(){
      var t = localStorage.getItem('hf_theme');
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'frontend/css/app.css' %}">
</head>
<body class="h-full flex items-center justify-center" style="background: var(--hf-base); color: var(--hf-text-primary); font-family: 'DM Sans', system-ui, sans-serif;">
  <div class="text-center px-6 py-16 max-w-lg">
    <p class="text-6xl font-bold" style="color: var(--hf-indigo-light);">404</p>
    <h1 class="mt-4 text-2xl font-bold" style="color: var(--hf-text-primary);">Page not found</h1>
    <p class="mt-2" style="color: var(--hf-text-muted);">Sorry, the page you're looking for doesn't exist or has been moved.</p>
    <div class="mt-8 flex items-center justify-center gap-4">
      <a href="/" class="hf-btn-primary inline-flex items-center">
        Go Home
      </a>
      <a href="/jobs/" class="hf-btn-secondary inline-flex items-center">
        Browse Jobs
      </a>
    </div>
  </div>
</body>
</html>
