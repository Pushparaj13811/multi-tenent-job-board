[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py
python_classes = Test*
python_functions = test_*
addopts = --reuse-db --no-header -q

[coverage:run]
source = apps,common
omit =
    */migrations/*
    */tests/*
    */admin.py
    manage.py
    config/*

[coverage:report]
fail_under = 90
show_missing = True
exclude_lines =
    pragma: no cover
    def __repr__
    if TYPE_CHECKING:
    raise NotImplementedError
