[tool.ruff]
target-version = "py312"
line-length = 120
src = ["apps", "config", "tests", "common"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "SIM",    # flake8-simplify
]
ignore = [
    "E501",   # Line length — handled by formatter
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config", "common"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
